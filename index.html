<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sam Chu - Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
    }
    #intro-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <video id="intro-video" src="https://raw.githubusercontent.com/samchuchu/samchu/main/title-vid/Final2.mp4" autoplay muted playsinline></video>
  
  <script>
    const video = document.getElementById('intro-video');
    
    // Redirect to main resume when video ends
    video.addEventListener('ended', function() {
      window.location.href = 'index2.html';
    });
    
    // Fallback: redirect after 10 seconds anyway (in case 'ended' doesn't fire)
    setTimeout(function() {
      window.location.href = 'index2.html';
    }, 10000);
  </script>
</body>
</html>
